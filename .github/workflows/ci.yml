name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  lint-and-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install dev deps
        run: |
          python -m pip install --upgrade pip
          pip install ruff pytest pytest-asyncio

      - name: Lint
        # Only lint the actively-maintained core package + tests.
        # Legacy modules (web/inline/modules/app.py/cli.py) will be
        # brought up to ruff-clean over subsequent PRs.
        run: ruff check forelka/core forelka/__init__.py forelka/__main__.py forelka/config.py forelka/i18n.py tests

      - name: Test
        run: pytest -q
