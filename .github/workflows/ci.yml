name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  lint-and-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install dev deps
        run: |
          python -m pip install --upgrade pip
          pip install ruff pytest pytest-asyncio

      - name: Lint
        run: ruff check forelka tests

      - name: Test
        run: pytest -q
